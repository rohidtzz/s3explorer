<!DOCTYPE html>
<html lang="en" data-theme="dark" style="color-scheme: dark;">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#13111C" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Secure, self-hosted S3 file explorer for managing buckets and objects" />
  <title>S3 Explorer</title>
  <style>
    /* Critical CSS - prevents flash of wrong color. System font stack avoids
       Google Fonts network hop, saving ~200-500ms cold start on slow mobile. */
    html, body, #root {
      background-color: hsl(250, 24%, 9%);
      min-height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    /* App-like feel on native: no text selection callouts, no overscroll bounce */
    html.capacitor-native,
    html.capacitor-native body {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
